backend:
  name: git-gateway # or test-repo
  # name: test-repo
  branch: main
  squash_merges: true

local_backend: true

# Media
media_folder: 'src/assets/reads'
public_folder: 'src/assets/reads'
# media_library:
#   name: cloudinary
#   max_file_size: 512000 # 512kb
#   folder_support: true

# Enable editorial workflow
# publish_mode: editorial_workflow

# Site URL for preview
site_url: https://deepreads.netlify.app
display_url: https://deepreads.netlify.app

# Collections
collections:
  - name: 'reads'
    label: 'Reads'
    folder: 'src/content/reads'
    create: true
    slug: '{{slug}}'
    preview_path: '/reads/#{{slug}}'
    sortable_fields: ['dateAdded', 'title']
    fields:
      - {
          label: 'Title',
          name: 'title',
          widget: 'string',
          pattern: ['.{10,150}', 'Must be between 10 and 150 characters'],
          hint: 'The title of the article or read',
        }
      - {
          label: 'URL',
          name: 'url',
          widget: 'string',
          pattern: ['^https?://.+', 'Must be a valid URL starting with http:// or https://'],
          hint: 'The external URL to the article',
        }
      - {
          label: 'Summary',
          name: 'summary',
          widget: 'text',
          required: false,
          pattern: ['.{0,300}', 'Must be 300 characters or less'],
          hint: 'Optional brief summary of the article',
        }
      - {
          label: 'Tags',
          name: 'tags',
          widget: 'list',
          allow_add: true,
          default: [],
          hint: 'Add custom tags for categorization (press Enter to add each tag)',
          required: false,
        }
      - {
          label: 'Date Added',
          name: 'dateAdded',
          widget: 'datetime',
          format: 'YYYY-MM-DD',
          default: '',
          hint: 'When this read was added to the collection',
        }
