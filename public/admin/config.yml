backend:
  name: git-gateway
  # name: test-repo
  branch: main
  squash_merges: true

local_backend: true

# Media
media_folder: 'src/assets/reads'
public_folder: 'src/assets/reads'
# media_library:
#   name: cloudinary
#   max_file_size: 512000 # 512kb
#   folder_support: true

# Enable editorial workflow
# publish_mode: editorial_workflow

# Site URL for preview
site_url: https://deepreads.netlify.app
display_url: https://deepreads.netlify.app

# Collections
collections:
  # 1. ADD THE NEW TAGS COLLECTION
  - name: 'tags'
    label: 'Tags'
    folder: 'src/content/tags'
    create: true
    slug: '{{slug}}'
    fields:
      - { label: 'Tag Name', name: 'title', widget: 'string', required: true } # <-- Added required

  # 2. UPDATE THE READS COLLECTION
  - name: 'reads'
    label: 'Reads'
    folder: 'src/content/reads'
    create: true
    slug: '{{slug}}'
    preview_path: '/reads/#{{slug}}'
    sortable_fields: ['dateAdded', 'title']
    fields:
      - {
          label: 'Title',
          name: 'title',
          widget: 'string',
          required: true, # <-- Added required
          pattern: ['.{10,150}', 'Must be between 10 and 150 characters'],
        }
      - {
          label: 'URL',
          name: 'url',
          widget: 'string',
          required: true, # <-- Added required
          pattern: ['^https?://.+', 'Must be a valid URL starting with http:// or https://'],
        }
      - {
          label: 'Summary',
          name: 'summary',
          widget: 'text',
          required: true, # <-- Changed to required
          pattern: ['.{50,300}', 'Must be between 50 and 300 characters'], # <-- Adjusted pattern for required field
        }
      # THIS IS THE KEY CHANGE
      - label: 'Tags'
        name: 'tags'
        widget: 'relation'
        collection: 'tags' # The collection to relate to
        search_fields: ['title'] # Field to search in the tags collection
        value_field: '{{slug}}' # The value to store in the post's frontmatter (the tag's slug)
        display_fields: ['title'] # The field to display in the dropdown
        multiple: true # Allow selecting multiple tags
        required: true
        min: 1 # <-- Enforce at least one tag is selected
      - {
          label: 'Date Added',
          name: 'dateAdded',
          widget: 'datetime',
          format: 'YYYY-MM-DD',
          required: true, # <-- Added required
          # default: '' # <-- Removed default to ensure user interaction
        }
